# gemini-search-mcp — labels file FORMAT EXAMPLE (not used for validation)
#
# This file documents the labels YAML format and gives the loader/κ code
# something to parse in tests. It is NOT the validation set — the real,
# human-signed-off reference labels live in `flash-lite.yaml` (see its header
# for how they were produced and the κ they yield). The two rows below are
# illustrative format samples, not authoritative judgments.
#
# Format: a list of cases. Each `case_id` MUST match an id in
# evals/dataset/cases.yaml. `scores` maps a dimension to a bucket. Buckets are
# low | med | high (the judge's [0,1] score is bucketed the same way via
# BucketScore: <1/3 low, <2/3 med, else high). Omit a dimension you didn't rate.
#
# Dimensions: relevance | correctness | source_quality | faithfulness |
#             citation_precision | citation_recall

- case_id: go-latest-version          # format sample
  scores:
    relevance: high
    correctness: high
    source_quality: med

- case_id: nonexistent-city           # format sample
  scores:
    relevance: high
    correctness: high
    source_quality: low
