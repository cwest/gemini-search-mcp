# repo:managed-extra
config:
  default: true
  MD013: false   # line length: prose wraps naturally
  MD033: false   # allow inline HTML (e.g. <br/> in mermaid labels)
  MD041: false   # first line need not be a top-level heading
  MD030: false   # managed CODE_OF_CONDUCT uses aligned list markers
  MD034: false   # managed CoC/SECURITY carry bare contact URLs/emails
  MD010:
    code_blocks: false   # tabs are valid inside fenced code (e.g. Go source)
