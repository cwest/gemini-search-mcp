name: release-please
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # A tag pushed by the default GITHUB_TOKEN does NOT trigger other workflows
      # (GitHub suppresses events raised by GITHUB_TOKEN to prevent recursion), so
      # the cut vX.Y.Z tag would never fire release.yml. Authenticate with a PAT
      # (RELEASE_PLEASE_TOKEN) so the tag push is attributed to a real actor and
      # correctly triggers the GoReleaser publish leg. Falls back to GITHUB_TOKEN
      # when the secret is absent (the release PR and tag still happen, but the
      # first release.yml run must then be triggered manually).
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
