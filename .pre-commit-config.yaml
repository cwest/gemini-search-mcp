# repo:managed
# Install both hook types so the commit-msg gate (conventional-pre-commit)
# fires alongside the pre-commit-stage hooks when `pre-commit install` runs.
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: mixed-line-ending
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: local
    hooks:
      - id: addlicense
        name: Add license header
        entry: bash -c 'addlicense -l apache -c "Google LLC" -y $(date +%Y) "$@"' --
        language: system
        pass_filenames: true
        # Only run on source-code files. Manifest/doc/config files
        # (README, LICENSE, CoC, CONTRIBUTING, SECURITY, AUTHORS,
        # .gitignore, .pre-commit-config.yaml, .github/*) carry
        # `repo:managed` markers and are owned by the `repo` tool —
        # addlicense must not touch them or the markers get displaced.
        types_or:
          - c
          - c++
          - go
          - python
          - rust
          - shell
          - javascript
          - ts
          - tsx
          - java
          - ruby
          - lua
          - swift
          - kotlin
          - scala
          - perl
          - php
          - elixir
